# k8s/overlays/prod/kustomization.yaml
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

configMapGenerator:
- envs:
  - prod-config.properties
  name: solmar-config-prod

# Genera el Secret leyendo el archivo .env (Kustomize lo codifica por ti)
secretGenerator:
- envs:
  - prod-secrets.env
  name: solmar-secrets-prod
# Aplica los patches
patches:
- path: replicas.yaml
- path: common-env-patch.yaml
- patch: |-
    - op: add
      path: /spec/template/spec/containers/0/envFrom
      value:
        - configMapRef:
            name: solmar-config-prod
        - secretRef:
            name: solmar-secrets-prod
  target:
    kind: Deployment
- patch: |-
    - op: add
      path: /spec/template/spec/containers/0/envFrom
      value:
        - configMapRef:
            name: solmar-config-prod
        - secretRef:
            name: solmar-secrets-prod
    - op: add
      path: /spec/template/spec/containers/0/env
      value:
        - name: Jwt__ExpirationInMinutes
          value: "15"
        - name: Jwt__RefreshTokenExpirationInMinutes
          value: "10080"
  target:
    kind: Deployment
    name: auth-service
resources:
- ../../base
images:
- name: diurvan/solmar-backend-authservice
  newName: diurvan/solmar-backend-authservice
  newTag: ef3bba2
